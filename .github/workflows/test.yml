name: Test

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  test:
    name: py${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest]
        include:
          - python: "3.13"
            os: macos-latest
          - python: "3.13"
            os: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      # No cache: `make testdata` fetches the whole corpus fresh each run (a
      # small tarball, sha-resolved via `git ls-remote`). Nothing is vendored
      # in this repo, so a partial or stale cache can only subtract
      # correctness — see rs.hocon's stale-fixture regression (#101) that led
      # the siblings to drop fixture caching.
      - name: Fetch conformance corpus
        run: make testdata

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --group dev

      - name: Test
        run: python -m pytest

      - name: Test with coverage
        if: matrix.python == '3.13' && matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install pytest-cov
          python -m pytest --cov=hocon --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python == '3.13' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: o3co/py.hocon
          files: coverage.xml
          fail_ci_if_error: false
