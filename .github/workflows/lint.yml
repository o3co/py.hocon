name: Lint

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --group dev
      - run: ruff check src tests benchmarks

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Pinned to the floor of requires-python so stdlib drift in newer
      # versions can't mask a 3.11 incompatibility (mypy python_version=3.11).
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --group dev
      - run: mypy
